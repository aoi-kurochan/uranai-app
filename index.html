<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数秘術鑑定 - あなたの運命の数字</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #7B6BA8; --primary-light: #A594D0; --primary-dark: #5A4B82;
  --accent-gold: #C9A96E; --accent-gold-light: #E8D5A8;
  --bg-deep: #1a1432; --bg-mid: #2d2456;
  --text-light: #F0EBF5; --text-muted: #B8A8D0;
  --glass-bg: rgba(255,255,255,0.06); --glass-border: rgba(255,255,255,0.12);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif; background: var(--bg-deep);
  color: var(--text-light); min-height: 100vh; overflow-x: hidden;
  line-height: 1.9; -webkit-font-smoothing: antialiased;
}
.bg-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 20% 20%, rgba(123,107,168,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(90,75,130,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(45,36,86,0.8) 0%, transparent 70%),
    linear-gradient(180deg, #1a1432 0%, #231c48 50%, #1a1432 100%);
}
.stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
.star {
  position: absolute; width: 3px; height: 3px; background: #fff; border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite; opacity: 0;
}
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:var(--brightness);transform:scale(1)} }
.container { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 20px; min-height: 100vh; }
.screen { display: none; animation: fadeSlideIn 0.6s ease-out; }
.screen.active { display: block; }
@keyframes fadeSlideIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

/* Welcome */
.welcome-header { text-align: center; padding: 60px 0 40px; }
.welcome-icon { font-size: 48px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.welcome-title {
  font-family: 'Noto Serif JP', serif; font-size: 28px; font-weight: 600; letter-spacing: 3px;
  background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold), var(--accent-gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px;
}
.welcome-subtitle { font-size: 14px; color: var(--text-muted); letter-spacing: 2px; font-weight: 300; }
.welcome-desc {
  text-align: center; margin: 30px 0; padding: 30px 20px;
  background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; backdrop-filter: blur(10px);
}
.welcome-desc p { font-size: 14px; color: var(--text-muted); line-height: 2.2; font-weight: 300; }
.welcome-features { display: flex; flex-direction: column; gap: 12px; margin: 30px 0; }
.feature-item {
  display: flex; align-items: center; gap: 14px; padding: 16px 20px;
  background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px;
}
.feature-icon { font-size: 22px; flex-shrink: 0; }
.feature-text { font-size: 13px; color: var(--text-muted); font-weight: 300; }

/* Buttons */
.btn-primary {
  display: block; width: 100%; padding: 18px; margin-top: 30px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif; letter-spacing: 2px; cursor: pointer;
  transition: all 0.3s; position: relative; overflow: hidden;
}
.btn-primary::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transition: left 0.5s;
}
.btn-primary:hover::before { left: 100%; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(123,107,168,0.4); }
.btn-primary:active { transform: translateY(0); }
.btn-back {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 0;
  background: none; border: none; color: var(--text-muted); font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: color 0.3s; margin-bottom: 10px;
}
.btn-back:hover { color: var(--text-light); }

/* Birthday */
.input-section { padding: 40px 0 20px; }
.section-label { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 500; text-align: center; margin-bottom: 8px; color: var(--accent-gold-light); }
.section-sublabel { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 30px; font-weight: 300; }
.date-input-group { display: flex; gap: 10px; align-items: flex-end; }
.date-field { flex: 1; }
.date-field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 1px; }
.date-field select {
  width: 100%; padding: 14px 12px; background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: 10px; color: var(--text-light); font-size: 16px; font-family: 'Noto Sans JP', sans-serif;
  appearance: none; -webkit-appearance: none; outline: none; transition: border-color 0.3s; text-align: center; cursor: pointer;
}
.date-field select:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(123,107,168,0.2); }
.date-field select option { background: var(--bg-mid); color: var(--text-light); }
.error-msg { text-align: center; color: #e88; font-size: 13px; margin-top: 12px; display: none; }

/* Questions */
.question-progress { display: flex; gap: 6px; margin-bottom: 30px; padding-top: 10px; }
.progress-dot { flex: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; transition: background 0.4s; }
.progress-dot.filled { background: var(--accent-gold); }
.progress-dot.current { background: var(--primary-light); }
.question-number { font-size: 12px; color: var(--accent-gold); letter-spacing: 2px; margin-bottom: 10px; }
.question-text { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 500; line-height: 1.7; margin-bottom: 30px; }
.question-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; font-weight: 300; }
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  display: flex; align-items: center; gap: 14px; padding: 18px 20px;
  background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px;
  color: var(--text-light); font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; transition: all 0.3s; text-align: left; line-height: 1.6;
}
.option-btn:hover { background: rgba(123,107,168,0.15); border-color: var(--primary-light); transform: translateX(4px); }
.option-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.option-label { font-weight: 400; }
.option-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 300; }

/* Loading */
.loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
.loading-orb {
  width: 100px; height: 100px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, var(--primary-light), var(--primary-dark));
  box-shadow: 0 0 40px rgba(123,107,168,0.4), 0 0 80px rgba(123,107,168,0.2);
  animation: orbPulse 2s ease-in-out infinite; margin-bottom: 40px;
}
@keyframes orbPulse { 0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(123,107,168,0.4)} 50%{transform:scale(1.1);box-shadow:0 0 60px rgba(123,107,168,0.6),0 0 100px rgba(123,107,168,0.3)} }
.loading-text { font-family: 'Noto Serif JP', serif; font-size: 16px; color: var(--text-muted); letter-spacing: 3px; animation: loadFade 2s ease-in-out infinite; }
@keyframes loadFade { 0%,100%{opacity:.5} 50%{opacity:1} }
.loading-steps { margin-top: 30px; display: flex; flex-direction: column; gap: 8px; }
.loading-step { font-size: 13px; color: var(--text-muted); opacity: 0; transform: translateY(10px); transition: all 0.5s; }
.loading-step.show { opacity: 1; transform: translateY(0); }

/* Result */
.result-container { padding: 20px 0 60px; }
.result-cover {
  text-align: center; padding: 60px 20px; margin-bottom: 40px;
  background: radial-gradient(ellipse at 30% 20%, rgba(165,148,208,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(201,169,110,0.1) 0%, transparent 50%), var(--glass-bg);
  border: 1px solid var(--glass-border); border-radius: 20px; position: relative; overflow: hidden;
}
.result-cover::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(201,169,110,0.05), transparent, rgba(165,148,208,0.05), transparent);
  animation: coverRotate 20s linear infinite;
}
@keyframes coverRotate { to{transform:rotate(360deg)} }
.result-cover-inner { position: relative; z-index: 1; }
.result-cover-icon { font-size: 40px; margin-bottom: 16px; }
.result-cover-title {
  font-family: 'Noto Serif JP', serif; font-size: 26px; font-weight: 600; letter-spacing: 5px;
  background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 20px;
}
.result-cover-date { font-size: 14px; color: var(--text-muted); letter-spacing: 2px; }
.result-cover-birthday { font-family: 'Noto Serif JP', serif; font-size: 18px; color: var(--text-light); margin-top: 8px; letter-spacing: 3px; }
.number-cards { display: flex; gap: 10px; margin-bottom: 40px; }
.number-card {
  flex: 1; text-align: center; padding: 20px 10px;
  background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; transition: transform 0.3s;
}
.number-card:hover { transform: translateY(-4px); }
.number-card-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 8px; }
.number-card-value {
  font-family: 'Noto Serif JP', serif; font-size: 36px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2;
}
.number-card-name { font-size: 11px; color: var(--primary-light); margin-top: 6px; font-weight: 500; }
.result-section {
  margin-bottom: 36px; padding: 30px 24px;
  background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 18px; position: relative;
}
.result-section::before {
  content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-gold), transparent); opacity: 0.3;
}
.section-number { font-size: 11px; color: var(--accent-gold); letter-spacing: 3px; margin-bottom: 6px; }
.section-title { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 600; margin-bottom: 20px; line-height: 1.5; color: var(--accent-gold-light); }
.section-body { font-size: 14px; line-height: 2.2; color: var(--text-muted); font-weight: 300; }
.section-body p { margin-bottom: 16px; }
.section-body p:last-child { margin-bottom: 0; }
.highlight-box { padding: 20px; margin: 16px 0; background: rgba(201,169,110,0.06); border-left: 3px solid var(--accent-gold); border-radius: 0 10px 10px 0; font-size: 14px; line-height: 2; }
.result-ending {
  text-align: center; padding: 40px 20px; margin-top: 20px;
  background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 18px;
}
.result-ending-title { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 500; color: var(--accent-gold-light); margin-bottom: 20px; }
.result-ending-text { font-size: 14px; line-height: 2.2; color: var(--text-muted); font-weight: 300; text-align: left; }
.result-ending-icon { font-size: 28px; margin-top: 20px; }
.result-footer { text-align: center; margin-top: 40px; padding: 20px; }
.result-footer p { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px; }
.btn-retry {
  display: block; width: 100%; padding: 16px; margin-top: 30px; background: transparent;
  color: var(--text-muted); border: 1px solid var(--glass-border); border-radius: 14px;
  font-size: 14px; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 2px; cursor: pointer; transition: all 0.3s;
}
.btn-retry:hover { border-color: var(--primary-light); color: var(--text-light); }
.disclaimer { margin-top: 16px; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 10px; font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.8; text-align: center; }
@media (max-width: 480px) {
  .container { padding: 16px; } .welcome-title { font-size: 24px; }
  .number-cards { gap: 6px; } .number-card { padding: 14px 6px; } .number-card-value { font-size: 28px; }
  .result-section { padding: 24px 18px; } .result-cover { padding: 40px 16px; }
}
</style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="stars" id="stars"></div>
<div class="container">
  <div class="screen active" id="screen-welcome">
    <div class="welcome-header">
      <div class="welcome-icon">&#10024;</div>
      <h1 class="welcome-title">数秘術鑑定</h1>
      <p class="welcome-subtitle">NUMEROLOGY READING</p>
    </div>
    <div class="welcome-desc">
      <p>生年月日に刻まれた<br>あなただけの「運命の数字」を読み解き<br>人生をより豊かにするための<br>メッセージをお届けします。</p>
    </div>
    <div class="welcome-features">
      <div class="feature-item"><span class="feature-icon">&#9733;</span><span class="feature-text">ライフパスナンバー ─ あなたの本質と人生の目的</span></div>
      <div class="feature-item"><span class="feature-icon">&#127873;</span><span class="feature-text">バースデーナンバー ─ 生まれ持った才能と強み</span></div>
      <div class="feature-item"><span class="feature-icon">&#128302;</span><span class="feature-text">パーソナルイヤー ─ 2026年のあなたの運勢</span></div>
    </div>
    <button class="btn-primary" onclick="goTo('screen-birthday')">鑑定をはじめる</button>
  </div>

  <div class="screen" id="screen-birthday">
    <button class="btn-back" onclick="goTo('screen-welcome')">&#8592; 戻る</button>
    <div class="input-section">
      <p class="section-label">生年月日を入力してください</p>
      <p class="section-sublabel">あなたの運命の数字を計算します</p>
      <div class="date-input-group">
        <div class="date-field"><label>年</label><select id="input-year"></select></div>
        <div class="date-field"><label>月</label><select id="input-month"></select></div>
        <div class="date-field"><label>日</label><select id="input-day"></select></div>
      </div>
      <p class="error-msg" id="date-error">有効な日付を入力してください</p>
      <button class="btn-primary" onclick="validateAndNext()">次へ進む</button>
    </div>
  </div>

  <div class="screen" id="screen-questions">
    <button class="btn-back" onclick="prevQuestion()">&#8592; 戻る</button>
    <div class="question-progress" id="q-progress"></div>
    <p class="question-number" id="q-number"></p>
    <h2 class="question-text" id="q-text"></h2>
    <p class="question-hint" id="q-hint"></p>
    <div class="options-list" id="q-options"></div>
  </div>

  <div class="screen" id="screen-loading">
    <div class="loading-container">
      <div class="loading-orb"></div>
      <p class="loading-text">鑑定中...</p>
      <div class="loading-steps">
        <p class="loading-step" id="ls1">&#9733; 運命の数字を計算しています</p>
        <p class="loading-step" id="ls2">&#128302; あなたの星の配置を読み解いています</p>
        <p class="loading-step" id="ls3">&#128220; 鑑定書を作成しています</p>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-result">
    <div class="result-container" id="result-container"></div>
  </div>
</div>

<script>
// Stars
(function(){const c=document.getElementById('stars');for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.setProperty('--dur',(3+Math.random()*4)+'s');s.style.setProperty('--brightness',(0.3+Math.random()*0.7));s.style.animationDelay=Math.random()*5+'s';s.style.width=s.style.height=(1+Math.random()*2.5)+'px';c.appendChild(s)}})();

// Date selects
(function(){const y=document.getElementById('input-year'),m=document.getElementById('input-month'),d=document.getElementById('input-day');const now=new Date();y.innerHTML='<option value="">--</option>';for(let i=now.getFullYear();i>=1930;i--)y.innerHTML+=`<option value="${i}">${i}</option>`;m.innerHTML='<option value="">--</option>';for(let i=1;i<=12;i++)m.innerHTML+=`<option value="${i}">${i}</option>`;d.innerHTML='<option value="">--</option>';for(let i=1;i<=31;i++)d.innerHTML+=`<option value="${i}">${i}</option>`})();

// State
let birthday={year:0,month:0,day:0}, answers=[], currentQ=0, selectedCategory='';

// ============================
// BRANCHING QUESTIONS
// ============================
const Q1 = {
  text: '今、人生で最も\n気になっていることは？',
  hint: '直感で選んでください。数字があなたの悩みに寄り添います。',
  options: [
    { icon: '&#10084;&#65039;', label: '恋愛・パートナーシップ', desc: '出会い、片思い、パートナーとの関係', value: 'love' },
    { icon: '&#128188;', label: '仕事・キャリア', desc: '適職、転職、やりがい、将来の方向性', value: 'career' },
    { icon: '&#128176;', label: 'お金・財運', desc: '収入、貯蓄、お金との付き合い方', value: 'money' },
    { icon: '&#128106;', label: '人間関係・家族', desc: '職場、友人、家族、夫婦関係', value: 'relationship' },
    { icon: '&#127807;', label: '心と体のバランス', desc: '日々の充実感、エネルギー、生活リズム', value: 'wellness' },
  ]
};

const branchQuestions = {
  love: [
    { text: '恋愛について、\n今一番気になることは？', hint: 'あなたの恋愛の悩みを数字の力で読み解きます。',
      options: [
        { icon: '&#128148;', label: '出会いがない', desc: '良い人に巡り合えない、出会いの場がない', value: 'no_encounter' },
        { icon: '&#128140;', label: '片思い・気持ちを伝えられない', desc: '好きな人がいるけれど一歩が踏み出せない', value: 'unrequited' },
        { icon: '&#128524;', label: 'パートナーとの関係に悩んでいる', desc: 'すれ違い、マンネリ、価値観の違い', value: 'partner_issue' },
        { icon: '&#128141;', label: '結婚・将来について考えている', desc: '結婚のタイミング、将来のパートナー像', value: 'marriage' },
      ]},
    { text: '恋愛で、自分の\nこんなところが気になる', hint: 'あなたの恋愛パターンを数字が教えてくれます。',
      options: [
        { icon: '&#128150;', label: '好きになると尽くしすぎる', desc: '相手のために自分を後回しにしがち', value: 'too_devoted' },
        { icon: '&#128566;', label: '本音を言えず我慢してしまう', desc: '嫌われたくなくて気持ちを隠しがち', value: 'suppress' },
        { icon: '&#128081;', label: '理想が高く妥協できない', desc: '相手に求める条件が多くなってしまう', value: 'idealistic' },
        { icon: '&#128560;', label: '傷つくのが怖くて踏み出せない', desc: '過去の経験から恋愛に臆病になっている', value: 'fear_hurt' },
      ]},
    { text: '理想のパートナーシップに\n近いのは？', hint: 'あなたの恋愛の理想を教えてください。',
      options: [
        { icon: '&#9749;', label: '一緒にいて自然体でいられる関係', desc: '無理せず、ありのままでいられる', value: 'natural' },
        { icon: '&#128640;', label: '刺激し合って成長できる関係', desc: 'お互いを高め合えるパートナーシップ', value: 'grow_together' },
        { icon: '&#128274;', label: '深い信頼で結ばれた安心できる関係', desc: '揺るがない絆と安心感', value: 'deep_trust' },
        { icon: '&#128330;', label: 'お互いの自由を尊重し合える関係', desc: '束縛せず、自立した二人の関係', value: 'mutual_freedom' },
      ]},
    { text: '恋愛において、今\n一番欲しいものは？', hint: '最後の質問です。心の声に従ってください。',
      options: [
        { icon: '&#127775;', label: '運命的な出会い', desc: '人生を変えるような素敵な出会い', value: 'destiny_meet' },
        { icon: '&#128172;', label: '素直になる勇気', desc: '自分の気持ちを正直に伝える力', value: 'honesty_courage' },
        { icon: '&#128293;', label: '関係を深めるヒント', desc: '今の関係をもっと良くする方法', value: 'deepen_hint' },

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function validateAndNext() {
  const y=parseInt(document.getElementById('input-year').value);
  const m=parseInt(document.getElementById('input-month').value);
  const d=parseInt(document.getElementById('input-day').value);
  const err=document.getElementById('date-error');
  if(!y||!m||!d){err.style.display='block';return}
  const date=new Date(y,m-1,d);
  if(date.getFullYear()!==y||date.getMonth()!==m-1||date.getDate()!==d){err.style.display='block';return}
  err.style.display='none';
  birthday={year:y,month:m,day:d};
  currentQ=0; answers=[]; selectedCategory='';
  renderQuestion();
  goTo('screen-questions');
}

function getActiveQuestions() {
  if (currentQ === 0) return [Q1];
  return [Q1, ...branchQuestions[selectedCategory]];
}

function renderQuestion() {
  const qs = getActiveQuestions();
  const q = qs[currentQ];
  const totalQ = 5;
  const prog = document.getElementById('q-progress');
  prog.innerHTML = '';
  for (let i = 0; i < totalQ; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i < currentQ ? ' filled' : '') + (i === currentQ ? ' current' : '');
    prog.appendChild(dot);
  }
  document.getElementById('q-number').textContent = `QUESTION ${currentQ + 1} / ${totalQ}`;
  document.getElementById('q-text').innerHTML = q.text.replace(/\n/g, '<br>');
  document.getElementById('q-hint').textContent = q.hint;
  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-icon">${opt.icon}</span><div><div class="option-label">${opt.label}</div><div class="option-desc">${opt.desc}</div></div>`;
    btn.onclick = () => selectOption(opt.value);
    opts.appendChild(btn);
  });
}

function selectOption(value) {
  answers[currentQ] = value;
  if (currentQ === 0) selectedCategory = value;
  if (currentQ < 4) {
    currentQ++;
    renderQuestion();
    const sc = document.getElementById('screen-questions');
    sc.style.animation = 'none'; sc.offsetHeight; sc.style.animation = 'fadeSlideIn 0.4s ease-out';
  } else {
    startLoading();
  }
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
  else goTo('screen-birthday');
}

function startLoading() {
  goTo('screen-loading');
  setTimeout(()=>document.getElementById('ls1').classList.add('show'),400);
  setTimeout(()=>document.getElementById('ls2').classList.add('show'),1200);
  setTimeout(()=>document.getElementById('ls3').classList.add('show'),2200);
  setTimeout(()=>{generateResult();goTo('screen-result');document.querySelectorAll('.loading-step').forEach(s=>s.classList.remove('show'))},3500);
}

// CALCULATIONS
// ============================
function reduceToSingle(n){while(n>9&&n!==11&&n!==22&&n!==33){n=String(n).split('').reduce((a,b)=>a+parseInt(b),0)}return n}
function calcLifePath(y,m,d){return reduceToSingle(reduceToSingle(y)+reduceToSingle(m)+reduceToSingle(d))}
function calcBirthday(d){return reduceToSingle(d)}
function calcPersonalYear(m,d,year){return reduceToSingle(reduceToSingle(m)+reduceToSingle(d)+reduceToSingle(year))}

// LP × category concern advice

  const d = {

    career:{1:'自分の裁量で動ける環境が、あなたの力を最も引き出してくれるかもしれません。新しい道を切り開くことに才能があるようです。',2:'チームの中で力を発揮するあなたは、人と人をつなぐ役割で輝く可能性があります。あなたの存在はチームにとって大きな力です。',3:'クリエイティブな才能を活かせるフィールドで、あなたの力はさらに開花するかもしれません。「楽しい」と感じることの中に天職のヒントが隠れているようです。',4:'正確さと継続力が求められる分野で真価が発揮されるかもしれません。コツコツと積み上げる仕事にこそ、あなたの力が光ります。',5:'変化と刺激のある環境で、あなたのエネルギーはさらに活性化するかもしれません。新しい挑戦に心が躍るタイプではないでしょうか。',6:'人の成長を支え、育てる仕事に深い充実感を覚えるかもしれません。職場の雰囲気を良くする力も、あなたの隠れた才能かもしれません。',7:'専門性を深められる環境が最も適しているかもしれません。一つのテーマを掘り下げることで、圧倒的な価値を生み出す可能性があります。',8:'マネジメントや戦略立案など、スケールの大きな仕事で力を発揮するタイプのようです。',9:'社会貢献や人のためになる活動に関わることで、深い充実感を得られるかもしれません。',11:'直感とインスピレーションを活かせる仕事が向いているかもしれません。「もっと自分らしい仕事がしたい」という気持ちは正しいサインです。',22:'大きなプロジェクトを形にする力をお持ちのようです。焦らず経験を積んでいけば、大きな花を咲かせるでしょう。',33:'愛と癒しを通じて人に貢献する仕事で、あなたの真価が発揮されるかもしれません。'},
    money:{1:'お金に対して前向きなエネルギーをお持ちのようです。自分で稼ぐ力があり、自己投資が良い結果につながりやすいタイプかもしれません。',2:'堅実にお金を管理できる才能をお持ちかもしれません。コツコツと積み上げる方法が合っているようです。',3:'楽しいことにお金を使いたくなるのは自然なこと。あなたの表現力やコミュニケーション力は、収入を生み出す力になる可能性があります。',4:'計画的な金銭管理が得意なタイプかもしれません。長期的な視点で資産を築いていく力をお持ちのようです。',5:'複数の収入源を持つことが、あなたのスタイルに合っているかもしれません。柔軟な資産形成を心がけてみてください。',6:'大切な人のために使うお金には惜しみがないかもしれませんが、ご自身への投資も大切な支出です。',7:'知識や学びへの投資が、結果的に最大の財産になるかもしれません。じっくり分析してから動くのが吉です。',8:'豊かさとの縁が深い数字をお持ちのようです。感謝の気持ちで還元することが、さらなる良い循環を生む鍵になりそうです。',9:'お金を「良いことに使う」と決めると、不思議と良い流れが生まれやすいかもしれません。',11:'直感的にお金の流れを感じ取れる力がありそうです。クリエイティブな才能が収入に結びつく可能性も高いでしょう。',22:'大きなスケールで物事を考えるのが得意なあなたには、大きな仕組みづくりが合っているかもしれません。',33:'必要な時に必要なものが不思議と手に入る── そんな金運の流れをお持ちのようです。'},
    relationship:{1:'周囲をリードする立場になりやすいあなた。時には周りの人に甘えてみるのも素敵なことかもしれません。弱さを見せることが、関係をさらに深くしてくれるでしょう。',2:'人の気持ちに敏感なあなた。すべての期待に応える必要はありません。「今は難しい」と伝えることも優しさの一つの形ではないでしょうか。',3:'社交的で多くの人と楽しく過ごせるあなた。本当の自分を見せられる深い関係も大切にしてみてください。',4:'信頼できる少数の方と深い関係を築くタイプかもしれません。時には気軽に新しい人と接してみると、意外な発見があるかもしれませんよ。',5:'適度な距離感のある関係が心地よいかもしれません。自然体の付き合いを心がけてみてください。',6:'面倒見の良さは素晴らしい魅力です。相手の力を信じて見守ることも、大切な関わり方の一つかもしれません。',7:'深い対話を好むあなた。信頼できる人にはあなたの考えを積極的に共有してみてください。きっと喜ばれるはずです。',8:'相手に任せる場面を増やすことで、より信頼し合える関係が育まれるかもしれません。',9:'本音を少しずつ見せていくことで、より深い信頼関係が生まれるかもしれません。ありのままの自分が一番の魅力です。',11:'繊細な感受性をお持ちのあなた。一人の時間で心をリセットすることを大切にしてください。',22:'あなたの内面を理解してくれる方を大切にしてください。対等な関係があなたにとって最も心地よいでしょう。',33:'深い愛情を持つあなたですが、ご自身も大切にしてください。相互に満たし合える関係こそがあなたにふさわしいです。'},

  };
  return (d[cat] && d[cat][lp]) || '';
}

function generateResult() {
  const lp = calcLifePath(birthday.year, birthday.month, birthday.day);
  const bd = calcBirthday(birthday.day);
  const py = calcPersonalYear(birthday.month, birthday.day, 2026);
  const lpD = lifePathData[lp], bdD = birthdayData[bd], pyD = personalYearData[py];
  const cat = answers[0], a2 = answers[1], a3 = answers[2], a4 = answers[3], a5 = answers[4];
  const catTitle = {love:'恋愛・パートナーシップ',career:'仕事・キャリア',money:'お金・財運',relationship:'人間関係・家族',wellness:'心と体のバランス'};
  const dateStr = `${birthday.year}年${birthday.month}月${birthday.day}日`;
  const today = new Date();
  const todayStr = `${today.getFullYear()}.${today.getMonth()+1}.${today.getDate()}`;
  const masterLabel = (lp===11||lp===22||lp===33) ? '<span style="font-size:10px;display:block;margin-top:4px;color:var(--primary-light);">MASTER</span>' : '';

  document.getElementById('result-container').innerHTML = `
    <div class="result-cover"><div class="result-cover-inner">
      <div class="result-cover-icon">&#10024;</div>
      <h1 class="result-cover-title">数秘術鑑定書</h1>
      <p class="result-cover-date">鑑定日：${todayStr}</p>
      <p class="result-cover-birthday">${dateStr} 生まれ</p>
    </div></div>

    <div class="number-cards">
      <div class="number-card"><p class="number-card-label">LIFE PATH</p><p class="number-card-value">${lp}${masterLabel}</p><p class="number-card-name">${lpD.name}</p></div>
      <div class="number-card"><p class="number-card-label">BIRTHDAY</p><p class="number-card-value">${bd}</p><p class="number-card-name">${bdD.name}</p></div>
      <div class="number-card"><p class="number-card-label">YEAR 2026</p><p class="number-card-value">${py}</p><p class="number-card-name">${pyD.theme.split('の')[0]}</p></div>
    </div>

    <div class="result-section"><p class="section-number">CHAPTER 01</p><h2 class="section-title">はじめに</h2><div class="section-body">
      <p>この度は、数秘術鑑定をお受けいただきありがとうございます。</p>
      <p>数秘術は、古代ギリシャの数学者ピタゴラスが体系化したとされる、数千年の歴史を持つ占術です。あなたが生まれた日に刻まれた数字から、性格の傾向や才能の可能性を読み解いていきます。</p>
      <p>ここに記された内容は、あなたの可能性を広げるためのヒントです。「当てはまるかも」と感じた部分を、ぜひ日々の生活に取り入れてみてください。</p>
    </div></div>

    <div class="result-section"><p class="section-number">CHAPTER 02</p>
      <h2 class="section-title">ライフパスナンバー ${lp}「${lpD.name}」<br><small style="font-size:12px;color:var(--text-muted);font-weight:300;">─ ${lpD.keyword} ─</small></h2>
      <div class="section-body">${lpD.trait.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>
    </div>

    <div class="result-section"><p class="section-number">CHAPTER 03</p>
      <h2 class="section-title">バースデーナンバー ${bd}「${bdD.name}」<br><small style="font-size:12px;color:var(--text-muted);font-weight:300;">─ 生まれ持った才能 ─</small></h2>
      <div class="section-body">
        <p>${bdD.desc}</p>
        <p>ライフパスナンバー${lp}の「${lpD.name}」としての資質に、バースデーナンバー${bd}の「${bdD.name}」が加わることで、あなたの個性はさらにユニークなものになっているようです。この2つの数字が交わるところに、あなただけの輝きがあるかもしれません。</p>
      </div>
    </div>

    <div class="result-section"><p class="section-number">CHAPTER 04</p>
      <h2 class="section-title">${catTitle[cat]}について<br><small style="font-size:12px;color:var(--text-muted);font-weight:300;">─ 数字が示すメッセージ ─</small></h2>

    <div class="result-section"><p class="section-number">CHAPTER 05</p>
      <h2 class="section-title">2026年の運勢 ─ パーソナルイヤー ${py}<br><small style="font-size:12px;color:var(--text-muted);font-weight:300;">「${pyD.theme}」</small></h2>
      <div class="section-body">${pyD.desc.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>
    </div>

    <div class="result-ending"><h2 class="result-ending-title">おわりに</h2><div class="result-ending-text">
      <p>${q4Content[a4]||''}</p>
      <p style="margin-top:16px;">${q5Content[a5]||''}</p>

    </div><p class="result-ending-icon">&#10024;</p></div>

    <div class="disclaimer"><p>※本鑑定はエンターテインメントを目的としたものであり、医療・法律・金融等の専門的なアドバイスに代わるものではありません。健康や法律、資産に関するご相談は、それぞれの専門家にご相談ください。</p></div>
    <div class="result-footer"><p>Numerology Reading</p><p style="margin-top:6px;">powered by 数秘術鑑定</p></div>
    <button class="btn-retry" onclick="retry()">もう一度鑑定する</button>`;
}

function retry() { answers=[]; currentQ=0; selectedCategory=''; goTo('screen-welcome'); }
</script>
